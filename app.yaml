# Databricks App config.
# Editar env vars abaixo por ambiente antes do deploy.
command:
  - python
  - -m
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  # ---- EDITAR POR AMBIENTE ----
  - name: WAREHOUSE_ID
    value: "2cfb6ce796f96ba4"
  - name: SERVERLESS_WAREHOUSE_ID
    value: "2cfb6ce796f96ba4"
  - name: UC_CATALOG
    value: "fevm_pzanela_classic_aws_catalog"
  - name: UC_SCHEMA
    value: "ocr_financeiro"
  - name: OCR_ENDPOINT
    value: "extrator-financeiro"
  # Jobs — atualizar com IDs gerados no bundle deploy
  - name: FEWSHOT_JOB_ID
    value: ""
  - name: BATCH_JOB_ID
    value: ""
  - name: VISION_JOB_ID
    value: ""
