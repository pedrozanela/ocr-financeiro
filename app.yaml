# Databricks App config — atualizar env vars para cada ambiente.
# Auth: the app's auto-created Service Principal authenticates via WorkspaceClient().
# No PATs or secret scopes needed.
# Guia completo: MIGRATION.md
command:
  - python
  - -m
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  # ---- EDITAR PARA CADA AMBIENTE ----
  # Warehouses
  - name: WAREHOUSE_ID
    value: "2c3975c5e258e46b"
  - name: SERVERLESS_WAREHOUSE_ID
    value: "95673eae327f2ace"
  # Unity Catalog
  - name: UC_CATALOG
    value: "cedip_fevm_aws_classic_stable_catalog"
  - name: UC_SCHEMA
    value: "ocr_financeiro_v3"
  # Serving Endpoint
  - name: OCR_ENDPOINT
    value: "extrator-financeiro"
  # Jobs (atualizar apos primeiro deploy)
  - name: FEWSHOT_JOB_ID
    value: "0"
