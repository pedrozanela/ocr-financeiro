# Databricks App config — apenas command.
#
# Env vars (UC_CATALOG, UC_SCHEMA, WAREHOUSE_ID, SERVERLESS_WAREHOUSE_ID,
# OCR_ENDPOINT, FEWSHOT_JOB_ID, BATCH_JOB_ID, VISION_JOB_ID) são:
#   • Injetadas automaticamente pelo `databricks bundle deploy` (lê databricks.yml)
#   • OU configuradas manualmente na UI: Apps → ocr-financeiro → Settings → Env vars
#
# Não adicionar env aqui — elas variam por workspace e quebram o fluxo multi-ambiente.
# Auth: the app's auto-created Service Principal authenticates via WorkspaceClient().
command:
  - python
  - -m
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"
