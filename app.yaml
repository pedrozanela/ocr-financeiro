# Databricks App config — atualizar env vars para cada ambiente.
# Guia completo: MIGRATION.md
command:
  - python
  - -m
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

resources:
  - name: pat-servico
    description: "PAT do Service Principal para chamar o endpoint OCR"
    secret:
      scope: ocr-financeiro
      key: pat-servico
      permission: READ

env:
  # Warehouses
  - name: WAREHOUSE_ID
    value: "970182bc1a3cc5a0"
  - name: SERVERLESS_WAREHOUSE_ID
    value: "970182bc1a3cc5a0"
  # Unity Catalog
  - name: UC_CATALOG
    value: "catalog_nqc8lc_8uoefp"
  - name: UC_SCHEMA
    value: "ocr_financeiro"
  # Serving Endpoint
  - name: OCR_ENDPOINT
    value: "extrator-financeiro"
  # Secrets
  - name: SECRET_SCOPE
    value: "ocr-financeiro"
  - name: SECRET_KEY
    value: "pat-servico"
  # Jobs
  - name: FEWSHOT_JOB_ID
    value: "0"
