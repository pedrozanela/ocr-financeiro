bundle:
  name: ocr-financeiro

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog catalog"
    default: "pedro_zanela"
  schema:
    description: "Schema para tabelas, modelo e volume"
    default: "ocr_financeiro"
  warehouse_id:
    description: "SQL Warehouse ID"
    default: "862f1d757f0424f7"
  secret_scope:
    description: "Secret scope do Service Principal"
    default: "ocr-financeiro"
  secret_key:
    description: "Chave do PAT no secret scope"
    default: "pat-servico"
  ocr_model:
    description: "Foundation Model API endpoint para extracao"
    default: "databricks-claude-sonnet-4-6"
  tag_project:
    description: "Tag de projeto"
    default: "ocr-financeiro"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT

  prod:
    mode: production
    workspace:
      profile: PROD
      root_path: "/Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}"
