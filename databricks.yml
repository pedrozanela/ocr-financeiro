# =============================================================================
# OCR Financeiro — Databricks Asset Bundle
#
# Para deploy em novo ambiente:
#   1. Adicionar um novo target com profile, catalog e warehouse IDs do ambiente
#   2. Deploy: databricks bundle deploy --target <target>
#   3. Após o primeiro deploy, rodar o job ocr-financeiro-setup-infrastructure
#      e depois ocr-financeiro-register-model para registrar o endpoint
#
# Todos os jobs usam Serverless compute (sem necessidade de configurar clusters).
# O app recebe os IDs dos jobs automaticamente via ${resources.jobs.<name>.id}.
# =============================================================================

bundle:
  name: ocr-financeiro

variables:
  catalog:
    description: "Unity Catalog catalog name"
  schema:
    default: ocr_financeiro
  warehouse_id:
    description: "SQL Warehouse ID"
  serverless_warehouse_id:
    description: "Serverless Warehouse ID (pode ser o mesmo)"
  endpoint_name:
    default: "extrator-financeiro"

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/ocr-financeiro

targets:
  # ── Ambiente pessoal (e2-demo-field-eng) ───────────────────────────────────
  e2demo:
    workspace:
      profile: DEFAULT
    variables:
      catalog: pedro_zanela
      warehouse_id: "862f1d757f0424f7"
      serverless_warehouse_id: "862f1d757f0424f7"

  # ── Ambientes do cliente ───────────────────────────────────────────────────
  fevm:
    workspace:
      profile: fevm
    variables:
      catalog: cedip_fevm_aws_classic_stable_catalog
      schema: ocr_financeiro_v3
      warehouse_id: "2c3975c5e258e46b"
      serverless_warehouse_id: "95673eae327f2ace"

  azfevm:
    default: true
    workspace:
      profile: azfevm
    variables:
      catalog: catalog_nqc8lc_8uoefp
      warehouse_id: "970182bc1a3cc5a0"
      serverless_warehouse_id: "970182bc1a3cc5a0"

resources:
  jobs:
    setup_infrastructure:
      name: "ocr-financeiro-setup-infrastructure"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ./notebooks/setup_infrastructure.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              sp_client_id: ""
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"

    register_model:
      name: "ocr-financeiro-register-model"
      tasks:
        - task_key: register
          notebook_task:
            notebook_path: ./notebooks/register_model.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              endpoint_name: ${var.endpoint_name}
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"

    grant_permissions:
      name: "ocr-financeiro-grant-permissions"
      tasks:
        - task_key: grant
          notebook_task:
            notebook_path: ./notebooks/grant_permissions.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              sp_client_id: ""
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"

    batch_job:
      name: "ocr-financeiro-batch-job"
      tasks:
        - task_key: batch
          notebook_task:
            notebook_path: ./notebooks/batch_job.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_path: ""
              endpoint: ${var.endpoint_name}
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"

    reprocess_all:
      name: "ocr-financeiro-reprocess-all"
      tasks:
        - task_key: reprocess
          notebook_task:
            notebook_path: ./notebooks/reprocess_all.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_path: ""
              endpoint: ${var.endpoint_name}
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"

    update_fewshot_weekly:
      name: "ocr-financeiro-atualizar-modelo"
      tasks:
        - task_key: update_fewshot
          notebook_task:
            notebook_path: ./notebooks/update_fewshot.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"
      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED

    # ── Vision OCR — Modo Performance ─────────────────────────────────────────
    vision_extraction:
      name: "ocr-financeiro-vision-extraction"
      tasks:
        - task_key: vision
          notebook_task:
            notebook_path: ./notebooks/vision_extraction.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_path: ""
              extractor_endpoint: ${var.endpoint_name}
              pdf_name: ""
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"

    vision_reprocess_all:
      name: "ocr-financeiro-vision-reprocess-all"
      tasks:
        - task_key: vision_batch
          notebook_task:
            notebook_path: ./notebooks/vision_reprocess_all.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_path: ""
              extractor_endpoint: ${var.endpoint_name}
              max_workers: "3"
              reprocess_existing: "false"
              pdf_filter: ""
            source: WORKSPACE
          environment_key: default
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: default
          spec:
            client: "5"

  apps:
    ocr_financeiro_app:
      name: "ocr-financeiro"
      description: "Extrator de dados financeiros (BP + DRE) com revisao humana"
      source_code_path: .
      config:
        command:
          - python
          - -m
          - uvicorn
          - "app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        env:
          - name: WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: SERVERLESS_WAREHOUSE_ID
            value: ${var.serverless_warehouse_id}
          - name: UC_CATALOG
            value: ${var.catalog}
          - name: UC_SCHEMA
            value: ${var.schema}
          - name: OCR_ENDPOINT
            value: ${var.endpoint_name}
          - name: FEWSHOT_JOB_ID
            value: ${resources.jobs.update_fewshot_weekly.id}
          - name: BATCH_JOB_ID
            value: ${resources.jobs.batch_job.id}
          - name: VISION_JOB_ID
            value: ${resources.jobs.vision_extraction.id}
      permissions:
        - level: CAN_MANAGE
          user_name: ${workspace.current_user.userName}
